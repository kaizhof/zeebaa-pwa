<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>K</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="K">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="K - زِ خاک بِرآیَد حَیات">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* فونت‌های لوکال لایون عربی */
        @font-face {
            font-family: 'Lyon Arabic Display';
            src: url('K-space/fonts/LyonArabicDisplayRegular.woff2') format('woff2'),
                 url('K-space/fonts/LyonArabicDisplayRegular.woff') format('woff');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Lyon Arabic Display';
            src: url('K-space/fonts/LyonArabicDisplayBlack.woff2') format('woff2'),
                 url('K-space/fonts/LyonArabicDisplayBlack.woff') format('woff');
            font-weight: 900;
            font-style: normal;
            font-display: swap;
        }

        body {
            background: #000000;
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Lyon Arabic Display', 'Times New Roman', 'Poppins', system-ui, serif;
            padding: 20px;
            margin: 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: clamp(20px, 6vh, 50px);
            width: 100%;
        }

        .loader-box {
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            width: 100%;
            max-width: min(80vw, 80vh, 500px);
            min-width: 140px;
            margin: 0 auto;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: transparent;
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
        }

        .poem-line {
            color: #ffffff;
            font-size: clamp(0.85rem, 5vw, 1.4rem);
            font-weight: 400;
            letter-spacing: 2px;
            text-align: center;
            font-family: 'Lyon Arabic Display', 'Times New Roman', serif;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            animation: fadePulse 2.2s ease-in-out infinite;
            background: transparent;
            padding: 0.3rem 0.8rem;
            direction: rtl;
            white-space: nowrap;
        }

        @keyframes fadePulse {
            0% { opacity: 0.6; text-shadow: 0 0 5px rgba(255,255,255,0.2); }
            50% { opacity: 1; text-shadow: 0 0 15px rgba(255,255,255,0.5); }
            100% { opacity: 0.6; text-shadow: 0 0 5px rgba(255,255,255,0.2); }
        }

        @media (max-width: 200px) {
            .poem-line {
                font-size: 0.7rem;
                white-space: normal;
            }
            .loader-box {
                min-width: 100px;
            }
        }

        @media (min-width: 376px) {
            .poem-line {
                font-size: 1.2rem;
            }
        }

        @media (min-width: 1200px) {
            .loader-box {
                max-width: min(45vw, 45vh, 450px);
            }
            .poem-line {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader-box">
            <canvas id="sazaLoader" aria-label="K loader - animation of life" role="img"></canvas>
        </div>
        <div class="poem-line" id="poemText">
            زِ خاک بِرآیَد حَیات...
        </div>
    </div>

    <script>
        // ============================================================
        // انیمیشن سازا - نمونه اولیه دقیق (فرم میله‌ای با گوشه‌های گرد)
        // الگو: نقطه → نیمه → کامل (۱ ستون)
        // سپس: کامل+۲نقطه → کامل+۲نیمه → ۳کامل → ... تا ۱۱ ستون
        // ============================================================
        
        // متن‌ها به زبان‌های مختلف
        const texts = [
            "زِ خاک بِرآیَد حَیات...",           // فارسی
            "From dust comes life...",            // انگلیسی
            "De la poussière vient la vie...",    // فرانسوی
            "Aus Staub entsteht Leben...",        // آلمانی
            "Del polvo surge la vida...",         // اسپانیایی
            "Dalla polvere nasce la vita...",     // ایتالیایی
            "Из праха возникает жизнь...",        // روسی
            "Tozdan hayat doğar...",              // ترکی
            "من الغبار تنبثق الحياة...",          // عربی
            "Kebuluran menjadi hidup...",         // اندونزیایی
            "З пороху постає життя...",           // اوکراینی
            "धूल से जीवन आता है...",              // هندی
            "از خاک زندگی پدید می‌آید...",         // فارسی (دری)
            "Zə torpaqdan həyat yaranır...",      // آذری
            "З праху ўзнікае жыццё...",           // بلاروسی
            "זו שטויב קומט לעבן...",              // ییدیش
            "تراب سے زندگی آتی ہے...",             // اردو
            "زِ خاک بِرآیَد حَیات..."             // برگشت به فارسی
        ];
        
        const FINAL_FRAME = [
            {x:0, y:20, w:1, h:5},
            {x:2, y:20, w:1, h:5},
            {x:4, y:20, w:1, h:5},
            {x:6, y:20, w:1, h:5},
            {x:8, y:20, w:1, h:5},
            {x:10, y:20, w:1, h:5},
            {x:12, y:20, w:1, h:5},
            {x:14, y:20, w:1, h:5},
            {x:16, y:20, w:1, h:5},
            {x:18, y:20, w:1, h:5},
            {x:20, y:20, w:1, h:5}
        ];

        const framesRaw = [
            { rects: [{x:10, y:22, w:1, h:1}] },
            { rects: [{x:10, y:21, w:1, h:3}] },
            { rects: [{x:10, y:20, w:1, h:5}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:22, w:1, h:1}, {x:12, y:22, w:1, h:1}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:21, w:1, h:3}, {x:12, y:21, w:1, h:3}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:12, y:20, w:1, h:5}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:12, y:20, w:1, h:5}, {x:6, y:22, w:1, h:1}, {x:14, y:22, w:1, h:1}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:12, y:20, w:1, h:5}, {x:6, y:21, w:1, h:3}, {x:14, y:21, w:1, h:3}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:12, y:20, w:1, h:5}, {x:6, y:20, w:1, h:5}, {x:14, y:20, w:1, h:5}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:12, y:20, w:1, h:5}, {x:6, y:20, w:1, h:5}, {x:14, y:20, w:1, h:5}, {x:4, y:22, w:1, h:1}, {x:16, y:22, w:1, h:1}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:12, y:20, w:1, h:5}, {x:6, y:20, w:1, h:5}, {x:14, y:20, w:1, h:5}, {x:4, y:21, w:1, h:3}, {x:16, y:21, w:1, h:3}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:12, y:20, w:1, h:5}, {x:6, y:20, w:1, h:5}, {x:14, y:20, w:1, h:5}, {x:4, y:20, w:1, h:5}, {x:16, y:20, w:1, h:5}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:12, y:20, w:1, h:5}, {x:6, y:20, w:1, h:5}, {x:14, y:20, w:1, h:5}, {x:4, y:20, w:1, h:5}, {x:16, y:20, w:1, h:5}, {x:2, y:22, w:1, h:1}, {x:18, y:22, w:1, h:1}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:12, y:20, w:1, h:5}, {x:6, y:20, w:1, h:5}, {x:14, y:20, w:1, h:5}, {x:4, y:20, w:1, h:5}, {x:16, y:20, w:1, h:5}, {x:2, y:21, w:1, h:3}, {x:18, y:21, w:1, h:3}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:12, y:20, w:1, h:5}, {x:6, y:20, w:1, h:5}, {x:14, y:20, w:1, h:5}, {x:4, y:20, w:1, h:5}, {x:16, y:20, w:1, h:5}, {x:2, y:20, w:1, h:5}, {x:18, y:20, w:1, h:5}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:12, y:20, w:1, h:5}, {x:6, y:20, w:1, h:5}, {x:14, y:20, w:1, h:5}, {x:4, y:20, w:1, h:5}, {x:16, y:20, w:1, h:5}, {x:2, y:20, w:1, h:5}, {x:18, y:20, w:1, h:5}, {x:0, y:22, w:1, h:1}, {x:20, y:22, w:1, h:1}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:12, y:20, w:1, h:5}, {x:6, y:20, w:1, h:5}, {x:14, y:20, w:1, h:5}, {x:4, y:20, w:1, h:5}, {x:16, y:20, w:1, h:5}, {x:2, y:20, w:1, h:5}, {x:18, y:20, w:1, h:5}, {x:0, y:21, w:1, h:3}, {x:20, y:21, w:1, h:3}] },
            { rects: FINAL_FRAME }
        ];

        const ORIGINAL_W = 21;
        const ORIGINAL_H = 25;
        
        const canvas = document.getElementById('sazaLoader');
        const ctx = canvas.getContext('2d');
        
        let currentFrame = 0;
        let animInterval = null;
        let textIndex = 0;
        let textInterval = null;
        
        const textElement = document.getElementById('poemText');
        
        function drawRoundedRect(ctx, x, y, w, h, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + w - radius, y);
            ctx.arcTo(x + w, y, x + w, y + radius, radius);
            ctx.lineTo(x + w, y + h - radius);
            ctx.arcTo(x + w, y + h, x + w - radius, y + h, radius);
            ctx.lineTo(x + radius, y + h);
            ctx.arcTo(x, y + h, x, y + h - radius, radius);
            ctx.lineTo(x, y + radius);
            ctx.arcTo(x, y, x + radius, y, radius);
            ctx.closePath();
            ctx.fill();
        }
        
        function drawFrame(frameIdx, scaleX, scaleY, canvasWidth, canvasHeight) {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            if (frameIdx >= framesRaw.length) return;
            
            const frame = framesRaw[frameIdx];
            ctx.save();
            
            const contentMinY = 20;
            const contentMaxY = 25;
            const contentCenterY = (contentMinY + contentMaxY) / 2;
            
            const canvasCenterY = canvasHeight / 2;
            const contentCenterYScaled = contentCenterY * scaleY;
            const offsetYPixels = canvasCenterY - contentCenterYScaled;
            
            ctx.translate(0, offsetYPixels);
            ctx.scale(scaleX, scaleY);
            ctx.fillStyle = "#D4D4D4";
            
            frame.rects.forEach(rect => {
                if (rect.h === 1) {
                    ctx.beginPath();
                    ctx.arc(rect.x + 0.5, rect.y + 0.5, 0.5, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    const radius = 0.5;
                    drawRoundedRect(ctx, rect.x, rect.y, rect.w, rect.h, radius);
                }
            });
            ctx.restore();
        }
        
        function resizeAndDraw() {
            const container = canvas.parentElement;
            const containerWidth = container.clientWidth;
            const targetSize = Math.max(containerWidth, 100);
            
            const rect = canvas.getBoundingClientRect();
            const actualWidth = rect.width;
            const actualHeight = rect.height;
            
            if (actualWidth === 0 || actualHeight === 0) return;
            
            const dpr = window.devicePixelRatio || 1;
            canvas.width = actualWidth * dpr;
            canvas.height = actualHeight * dpr;
            
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);
            
            const scaleX = actualWidth / ORIGINAL_W;
            const scaleY = actualHeight / ORIGINAL_H;
            
            drawFrame(currentFrame, scaleX, scaleY, actualWidth, actualHeight);
        }
        
        function nextFrame() {
            currentFrame = (currentFrame + 1) % framesRaw.length;
            resizeAndDraw();
        }
        
        function startAnimation() {
            if (animInterval) clearInterval(animInterval);
            animInterval = setInterval(nextFrame, 150);
        }
        
        function changeText() {
            textIndex = (textIndex + 1) % texts.length;
            textElement.style.opacity = '0';
            setTimeout(() => {
                textElement.textContent = texts[textIndex];
                textElement.style.opacity = '1';
            }, 300);
        }
        
        function startTextRotation() {
            if (textInterval) clearInterval(textInterval);
            textInterval = setInterval(changeText, 5000);
        }
        
        let resizeObserver = null;
        
        function initResizeObserver() {
            if (resizeObserver) resizeObserver.disconnect();
            resizeObserver = new ResizeObserver(() => {
                resizeAndDraw();
            });
            resizeObserver.observe(canvas);
            if (canvas.parentElement) {
                resizeObserver.observe(canvas.parentElement);
            }
        }
        
        window.addEventListener('resize', () => {
            resizeAndDraw();
        });
        
        window.addEventListener('orientationchange', () => {
            setTimeout(resizeAndDraw, 50);
        });
        
        function init() {
            setTimeout(() => {
                resizeAndDraw();
            }, 0);
            startAnimation();
            startTextRotation();
            initResizeObserver();
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
        
        // PWA Service Worker برای آفلاین
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(() => {
                console.log('✅ Service Worker registered');
            }).catch(err => {
                console.log('SW registration failed:', err);
            });
        }
        
        console.log('K | انیمیشن میله‌ای | واکنش‌گرا | متن‌های چندزبانه');
    </script>
</body>
</html>
