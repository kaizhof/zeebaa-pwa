<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ZEEBAA Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: #0a0a2a;
            color: white;
            font-family: system-ui;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .box {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #fff;
            border-top: 5px solid #ffaa33;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="loader"></div>
        <h1>🌍 ZEEBAA</h1>
        <p>در حال بارگذاری...</p>
        <p style="font-size:12px; margin-top:20px;">✅ صفحه تست کار میکند!</p>
    </div>
</body>
</html>
