<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>K</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="K">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="K - زِ خاک بِرآیَد حَیات">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000000;
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 20px;
            margin: 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: clamp(20px, 6vh, 50px);
            width: 100%;
        }

        .loader-box {
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            width: 100%;
            max-width: min(80vw, 80vh, 500px);
            min-width: 140px;
            margin: 0 auto;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: transparent;
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
        }

        .poem-line {
            color: #ffffff;
            font-size: clamp(0.85rem, 5vw, 1.4rem);
            font-weight: 400;
            letter-spacing: 2px;
            text-align: center;
            font-family: 'Times New Roman', serif;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            animation: fadePulse 2.2s ease-in-out infinite;
            padding: 0.3rem 0.8rem;
            direction: rtl;
            white-space: nowrap;
        }

        @keyframes fadePulse {
            0% { opacity: 0.6; text-shadow: 0 0 5px rgba(255,255,255,0.2); }
            50% { opacity: 1; text-shadow: 0 0 15px rgba(255,255,255,0.5); }
            100% { opacity: 0.6; text-shadow: 0 0 5px rgba(255,255,255,0.2); }
        }

        /* سنسور دیتا - کوچک و مخفی در گوشه */
        #sensorData {
            position: fixed;
            bottom: 5px;
            right: 5px;
            background: rgba(0,0,0,0.4);
            color: #88ffaa;
            font-size: 9px;
            padding: 4px 8px;
            border-radius: 8px;
            font-family: monospace;
            z-index: 100;
            direction: ltr;
            text-align: right;
            opacity: 0.5;
        }

        @media (max-width: 200px) {
            .poem-line { font-size: 0.7rem; white-space: normal; }
            .loader-box { min-width: 100px; }
        }

        @media (min-width: 376px) {
            .poem-line { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader-box">
            <canvas id="sazaLoader" aria-label="K loader" role="img"></canvas>
        </div>
        <div class="poem-line" id="poemText">
            زِ خاک بِرآیَد حَیات...
        </div>
    </div>

    <div id="sensorData"></div>

    <script>
        // ============================================================
        // انیمیشن K
        // ============================================================
        
        const texts = [
            "زِ خاک بِرآیَد حَیات...",
            "From dust comes life...",
            "De la poussière vient la vie...",
            "Aus Staub entsteht Leben...",
            "Del polvo surge la vida...",
            "Dalla polvere nasce la vita...",
            "Из праха возникает жизнь...",
            "Tozdan hayat doğar...",
            "من الغبار تنبثق الحياة..."
        ];
        
        const FINAL_FRAME = [
            {x:0, y:20, w:1, h:5}, {x:2, y:20, w:1, h:5}, {x:4, y:20, w:1, h:5},
            {x:6, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:10, y:20, w:1, h:5},
            {x:12, y:20, w:1, h:5}, {x:14, y:20, w:1, h:5}, {x:16, y:20, w:1, h:5},
            {x:18, y:20, w:1, h:5}, {x:20, y:20, w:1, h:5}
        ];

        const framesRaw = [
            { rects: [{x:10, y:22, w:1, h:1}] },
            { rects: [{x:10, y:21, w:1, h:3}] },
            { rects: [{x:10, y:20, w:1, h:5}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:22, w:1, h:1}, {x:12, y:22, w:1, h:1}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:21, w:1, h:3}, {x:12, y:21, w:1, h:3}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:12, y:20, w:1, h:5}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:12, y:20, w:1, h:5}, {x:6, y:22, w:1, h:1}, {x:14, y:22, w:1, h:1}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:12, y:20, w:1, h:5}, {x:6, y:21, w:1, h:3}, {x:14, y:21, w:1, h:3}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:12, y:20, w:1, h:5}, {x:6, y:20, w:1, h:5}, {x:14, y:20, w:1, h:5}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:12, y:20, w:1, h:5}, {x:6, y:20, w:1, h:5}, {x:14, y:20, w:1, h:5}, {x:4, y:22, w:1, h:1}, {x:16, y:22, w:1, h:1}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:12, y:20, w:1, h:5}, {x:6, y:20, w:1, h:5}, {x:14, y:20, w:1, h:5}, {x:4, y:21, w:1, h:3}, {x:16, y:21, w:1, h:3}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:12, y:20, w:1, h:5}, {x:6, y:20, w:1, h:5}, {x:14, y:20, w:1, h:5}, {x:4, y:20, w:1, h:5}, {x:16, y:20, w:1, h:5}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:12, y:20, w:1, h:5}, {x:6, y:20, w:1, h:5}, {x:14, y:20, w:1, h:5}, {x:4, y:20, w:1, h:5}, {x:16, y:20, w:1, h:5}, {x:2, y:22, w:1, h:1}, {x:18, y:22, w:1, h:1}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:12, y:20, w:1, h:5}, {x:6, y:20, w:1, h:5}, {x:14, y:20, w:1, h:5}, {x:4, y:20, w:1, h:5}, {x:16, y:20, w:1, h:5}, {x:2, y:21, w:1, h:3}, {x:18, y:21, w:1, h:3}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:12, y:20, w:1, h:5}, {x:6, y:20, w:1, h:5}, {x:14, y:20, w:1, h:5}, {x:4, y:20, w:1, h:5}, {x:16, y:20, w:1, h:5}, {x:2, y:20, w:1, h:5}, {x:18, y:20, w:1, h:5}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:12, y:20, w:1, h:5}, {x:6, y:20, w:1, h:5}, {x:14, y:20, w:1, h:5}, {x:4, y:20, w:1, h:5}, {x:16, y:20, w:1, h:5}, {x:2, y:20, w:1, h:5}, {x:18, y:20, w:1, h:5}, {x:0, y:22, w:1, h:1}, {x:20, y:22, w:1, h:1}] },
            { rects: [{x:10, y:20, w:1, h:5}, {x:8, y:20, w:1, h:5}, {x:12, y:20, w:1, h:5}, {x:6, y:20, w:1, h:5}, {x:14, y:20, w:1, h:5}, {x:4, y:20, w:1, h:5}, {x:16, y:20, w:1, h:5}, {x:2, y:20, w:1, h:5}, {x:18, y:20, w:1, h:5}, {x:0, y:21, w:1, h:3}, {x:20, y:21, w:1, h:3}] },
            { rects: FINAL_FRAME }
        ];

        const ORIGINAL_W = 21;
        const ORIGINAL_H = 25;
        
        const canvas = document.getElementById('sazaLoader');
        const ctx = canvas.getContext('2d');
        
        let currentFrame = 0;
        let animInterval = null;
        let textIndex = 0;
        let textInterval = null;
        
        const textElement = document.getElementById('poemText');
        
        function drawRoundedRect(ctx, x, y, w, h, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + w - radius, y);
            ctx.arcTo(x + w, y, x + w, y + radius, radius);
            ctx.lineTo(x + w, y + h - radius);
            ctx.arcTo(x + w, y + h, x + w - radius, y + h, radius);
            ctx.lineTo(x + radius, y + h);
            ctx.arcTo(x, y + h, x, y + h - radius, radius);
            ctx.lineTo(x, y + radius);
            ctx.arcTo(x, y, x + radius, y, radius);
            ctx.closePath();
            ctx.fill();
        }
        
        function drawFrame(frameIdx, scaleX, scaleY, canvasWidth, canvasHeight) {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            if (frameIdx >= framesRaw.length) return;
            
            const frame = framesRaw[frameIdx];
            ctx.save();
            
            const contentMinY = 20;
            const contentMaxY = 25;
            const contentCenterY = (contentMinY + contentMaxY) / 2;
            const canvasCenterY = canvasHeight / 2;
            const contentCenterYScaled = contentCenterY * scaleY;
            const offsetYPixels = canvasCenterY - contentCenterYScaled;
            
            ctx.translate(0, offsetYPixels);
            ctx.scale(scaleX, scaleY);
            ctx.fillStyle = "#D4D4D4";
            
            frame.rects.forEach(rect => {
                if (rect.h === 1) {
                    ctx.beginPath();
                    ctx.arc(rect.x + 0.5, rect.y + 0.5, 0.5, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    drawRoundedRect(ctx, rect.x, rect.y, rect.w, rect.h, 0.5);
                }
            });
            ctx.restore();
        }
        
        function resizeAndDraw() {
            const rect = canvas.getBoundingClientRect();
            const actualWidth = rect.width;
            const actualHeight = rect.height;
            
            if (actualWidth === 0 || actualHeight === 0) return;
            
            const dpr = window.devicePixelRatio || 1;
            canvas.width = actualWidth * dpr;
            canvas.height = actualHeight * dpr;
            
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);
            
            const scaleX = actualWidth / ORIGINAL_W;
            const scaleY = actualHeight / ORIGINAL_H;
            
            drawFrame(currentFrame, scaleX, scaleY, actualWidth, actualHeight);
        }
        
        function nextFrame() {
            currentFrame = (currentFrame + 1) % framesRaw.length;
            resizeAndDraw();
        }
        
        function startAnimation() {
            if (animInterval) clearInterval(animInterval);
            animInterval = setInterval(nextFrame, 150);
        }
        
        function changeText() {
            textIndex = (textIndex + 1) % texts.length;
            textElement.style.opacity = '0';
            setTimeout(() => {
                textElement.textContent = texts[textIndex];
                textElement.style.opacity = '1';
            }, 300);
        }
        
        function startTextRotation() {
            if (textInterval) clearInterval(textInterval);
            textInterval = setInterval(changeText, 5000);
        }
        
        // ============================================================
        // سنسورها - خودکار و بی صدا
        // ============================================================
        
        let sensorActive = false;
        
        // ژیروسکوپ خودکار
        function initGyroscope() {
            if (typeof DeviceOrientationEvent !== 'undefined') {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    // iOS - درخواست یک بار هنگام نصب
                    setTimeout(() => {
                        DeviceOrientationEvent.requestPermission()
                            .then(response => {
                                if (response === 'granted') {
                                    window.addEventListener('deviceorientation', handleOrientation);
                                    sensorActive = true;
                                }
                            })
                            .catch(() => {});
                    }, 1000);
                } else {
                    // Android و مرورگرهای دیگر
                    window.addEventListener('deviceorientation', handleOrientation);
                    sensorActive = true;
                }
            }
        }
        
        function handleOrientation(event) {
            if (!sensorActive) return;
            const dataDiv = document.getElementById('sensorData');
            if (dataDiv) {
                dataDiv.innerHTML = `${Math.round(event.alpha || 0)}° ${Math.round(event.beta || 0)}° ${Math.round(event.gamma || 0)}°`;
            }
        }
        
        // میکروفون یک بار در پس‌زمینه
        let micPermissionGranted = false;
        function initMicrophone() {
            if (!micPermissionGranted) {
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {
                        micPermissionGranted = true;
                        stream.getTracks().forEach(track => track.stop());
                        console.log('🎤 میکروفون permission saved');
                    })
                    .catch(() => {});
            }
        }
        
        // دوربین یک بار در پس‌زمینه
        let cameraPermissionGranted = false;
        function initCamera() {
            if (!cameraPermissionGranted) {
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(stream => {
                        cameraPermissionGranted = true;
                        stream.getTracks().forEach(track => track.stop());
                        console.log('📷 دوربین permission saved');
                    })
                    .catch(() => {});
            }
        }
        
        // ============================================================
        // نوتیفیکیشن خودکار
        // ============================================================
        
        async function initNotifications() {
            if (Notification.permission === 'default') {
                const permission = await Notification.requestPermission();
                if (permission === 'granted' && navigator.serviceWorker.controller) {
                    navigator.serviceWorker.ready.then(reg => {
                        reg.showNotification('🔔 K', {
                            body: 'زِ خاک بِرآیَد حَیات...',
                            icon: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='black'/%3E%3Ctext x='50' y='72' font-size='70' text-anchor='middle' fill='%23D4D4D4' font-weight='bold'%3EK%3C/text%3E%3C/svg%3E",
                            silent: false,
                            requireInteraction: false
                        });
                    });
                }
            }
        }
        
        // وضعیت آنلاین/آفلاین
        window.addEventListener('online', () => {
            if (Notification.permission === 'granted') {
                navigator.serviceWorker.ready.then(reg => {
                    reg.showNotification('🌐 آنلاین', { body: 'اتصال برقرار است', silent: true });
                });
            }
        });
        
        // ============================================================
        // مقداردهی اولیه
        // ============================================================
        
        let resizeObserver = null;
        
        function initResizeObserver() {
            if (resizeObserver) resizeObserver.disconnect();
            resizeObserver = new ResizeObserver(() => resizeAndDraw());
            resizeObserver.observe(canvas);
        }
        
        window.addEventListener('resize', () => resizeAndDraw());
        window.addEventListener('orientationchange', () => setTimeout(resizeAndDraw, 50));
        
        function init() {
            resizeAndDraw();
            startAnimation();
            startTextRotation();
            initResizeObserver();
            
            // سنسورها - یک بار و بی صدا
            setTimeout(initGyroscope, 500);
            setTimeout(initMicrophone, 1000);
            setTimeout(initCamera, 1500);
            setTimeout(initNotifications, 2000);
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
        
        // ثبت سرویس ورکر
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/zeebaa-pwa/sw.js')
                .then(() => console.log('✅ SW registered'))
                .catch(err => console.log('SW error:', err));
        }
        
        console.log('K | نسخه نهایی - همه چیز خودکار');
    </script>
</body>
</html>
